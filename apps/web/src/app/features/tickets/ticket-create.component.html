<div class="min-h-screen bg-gray-50">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Back Button -->
    <div class="mb-6">
      <a
        routerLink="/tickets"
        class="inline-flex items-center text-sm text-gray-600 hover:text-gray-900"
      >
        <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        Back to Tickets
      </a>
    </div>

    <!-- Header -->
    <div class="bg-white rounded-lg shadow mb-6">
      <div class="p-6 border-b border-gray-200">
        <h1 class="text-2xl font-bold text-gray-900">Create New Ticket</h1>
        <p class="mt-1 text-sm text-gray-600">Fill in the details below to create a new support ticket</p>
      </div>
    </div>

    <!-- Form -->
    <div class="bg-white rounded-lg shadow">
      <form (ngSubmit)="onSubmit()" class="p-6 space-y-6">
        <!-- Error Message -->
        @if (error()) {
          <app-error-message [message]="error() || ''" [dismissible]="true" (dismissed)="error.set(null)" />
        }

        <!-- Title -->
        <app-input
          id="title"
          label="Title"
          [(value)]="title"
          (valueChange)="title = $event"
          placeholder="Brief summary of the issue"
          [required]="true"
          [error]="submitted() && !title ? 'Title is required' : ''"
        />

        <!-- Description -->
        <div>
          <label for="description" class="block text-sm font-medium text-gray-700 mb-1">
            Description
            <span class="text-red-500">*</span>
          </label>
          <textarea
            id="description"
            [(ngModel)]="description"
            name="description"
            rows="6"
            placeholder="Detailed description of the issue or request"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-brand-500 focus:border-brand-500"
            [class.border-red-300]="submitted() && !description"
          ></textarea>
          @if (submitted() && !description) {
            <p class="mt-1 text-sm text-red-600">Description is required</p>
          }
        </div>

        <!-- Priority -->
        <div>
          <label for="priority" class="block text-sm font-medium text-gray-700 mb-1">
            Priority
          </label>
          <select
            id="priority"
            [(ngModel)]="priority"
            name="priority"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-brand-500 focus:border-brand-500"
          >
            <option value="LOW">Low</option>
            <option value="MEDIUM" selected>Medium</option>
            <option value="HIGH">High</option>
            <option value="CRITICAL">Critical</option>
          </select>
          <p class="mt-1 text-sm text-gray-500">Default is Medium if not selected</p>
        </div>

        <!-- Assignee (Admin only) -->
        @if (authService.isAdmin()) {
          <div>
            <label for="assignee" class="block text-sm font-medium text-gray-700 mb-1">
              Assign To
            </label>
            <select
              id="assignee"
              [(ngModel)]="assigneeId"
              name="assignee"
              class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-brand-500 focus:border-brand-500"
            >
              <option value="">Unassigned (assign to me)</option>
              @for (agent of agents(); track agent.id) {
                <option [value]="agent.id">{{ agent.name }}</option>
              }
            </select>
          </div>
        }

        <!-- Submit Button -->
        <div class="flex justify-end gap-3 pt-6 border-t border-gray-200">
          <app-button
            type="button"
            variant="secondary"
            (clicked)="cancel()"
          >
            Cancel
          </app-button>
          <app-button
            type="submit"
            variant="primary"
            [loading]="submitting()"
            [disabled]="submitting()"
          >
            Create Ticket
          </app-button>
        </div>
      </form>
    </div>
  </div>
</div>
